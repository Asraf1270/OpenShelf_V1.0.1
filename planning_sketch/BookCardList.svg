<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font: bold 34px Arial, sans-serif;
      fill: #222;
    }
    .subtitle {
      font: 22px Arial, sans-serif;
      fill: #666;
    }
    .label {
      font: 18px Arial, sans-serif;
      fill: #444;
    }
    .small {
      font: 16px Arial, sans-serif;
      fill: #666;
    }
    .book-title {
      font: bold 42px Arial, sans-serif;
      fill: #111;
    }
    .author {
      font: 30px Arial, sans-serif;
      fill: #555;
    }
    .badge {
      font: bold 24px Arial, sans-serif;
      fill: white;
    }
    .owner-name {
      font: bold 28px Arial, sans-serif;
      fill: #111;
    }
    .owner-room {
      font: 24px Arial, sans-serif;
      fill: #555;
    }
    .star {
      fill: none;
      stroke: #555;
      stroke-width: 2;
    }
    .container {
      fill: #fafafa;
      stroke: #333;
      stroke-width: 3;
      rx: 24;
    }
    .cover {
      fill: #ececec;
      stroke: #444;
      stroke-width: 3;
      rx: 20;
    }
    .pill {
      fill: #f0f0f0;
      stroke: #444;
      stroke-width: 2;
      rx: 14;
    }
    .available {
      fill: #2e9d59;
      stroke: #1f6f3f;
      stroke-width: 2;
      rx: 14;
    }
    .line {
      stroke: #999;
      stroke-dasharray: 5 5;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Header -->
  <text x="60" y="60" class="title">OpenShelf</text>
  <text x="260" y="60" class="subtitle">- Book Card UI Wireframe v2.0</text>

  <!-- Main Card -->
  <rect x="60" y="110" width="1080" height="520" class="container"/>

  <!-- Book Cover -->
  <rect x="100" y="170" width="300" height="360" class="cover"/>
  <rect x="130" y="200" width="240" height="300" class="cover"/>

  <text x="250" y="340" text-anchor="middle" class="label">
    Large Book Cover
  </text>
  <text x="250" y="375" text-anchor="middle" class="label">
    Frame
  </text>

  <!-- Availability Badge -->
  <rect x="920" y="140" width="170" height="60" class="available"/>
  <text x="1005" y="178" text-anchor="middle" class="badge">Available</text>

  <!-- Book Info -->
  <text x="470" y="240" class="book-title">
    Database System
  </text>
  <text x="470" y="290" class="book-title">
    Concepts v10.0
  </text>

  <!-- Author -->
  <text x="470" y="350" class="author">
    Abraham Silberschatz
  </text>

  <!-- Category -->
  <rect x="470" y="390" width="140" height="44" class="pill"/>
  <text x="540" y="418" text-anchor="middle" class="label">
    Academic
  </text>

  <!-- Rating -->
  <g transform="translate(470,470)">
    <!-- Stars -->
    <polygon class="star"
      points="20,0 26,14 42,14 29,24 34,40 20,30 6,40 11,24 -2,14 14,14"/>
    <polygon class="star"
      points="70,0 76,14 92,14 79,24 84,40 70,30 56,40 61,24 48,14 64,14"/>
    <polygon class="star"
      points="120,0 126,14 142,14 129,24 134,40 120,30 106,40 111,24 98,14 114,14"/>
    <polygon class="star"
      points="170,0 176,14 192,14 179,24 184,40 170,30 156,40 161,24 148,14 164,14"/>
    <polygon class="star"
      points="220,0 226,14 242,14 229,24 234,40 220,30 206,40 211,24 198,14 214,14"/>
  </g>

  <text x="730" y="500" class="label">(4.7 / 5)</text>

  <!-- Owner Section -->
  <circle cx="520" cy="570" r="42" fill="#f2f2f2" stroke="#444" stroke-width="3"/>

  <!-- Simple Profile Icon -->
  <circle cx="520" cy="555" r="12" fill="none" stroke="#444" stroke-width="2"/>
  <path d="M500 585 Q520 565 540 585" fill="none" stroke="#444" stroke-width="2"/>

  <!-- Owner Text -->
  <text x="580" y="560" class="owner-name">Md. Asraful Islam</text>
  <text x="580" y="600" class="owner-room">B-603 Hall</text>

  <!-- Annotation Guides -->
  <line x1="400" y1="260" x2="450" y2="260" class="line"/>
  <text x="460" y="255" class="small">Book Title</text>

  <line x1="760" y1="345" x2="860" y2="345" class="line"/>
  <text x="870" y="350" class="small">Author Name</text>

  <line x1="610" y1="410" x2="760" y2="410" class="line"/>
  <text x="770" y="415" class="small">Category Badge</text>

  <line x1="730" y1="490" x2="860" y2="490" class="line"/>
  <text x="870" y="495" class="small">Rating</text>

  <line x1="560" y1="570" x2="760" y2="570" class="line"/>
  <text x="770" y="575" class="small">Owner Info</text>

</svg>